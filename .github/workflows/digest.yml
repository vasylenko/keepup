name: weekly digest

on:
  workflow_dispatch:

permissions:
  contents: write # commit the rendered week back to main
  models: read # GitHub Models inference with the workflow token

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Install markfetch
        run: npm install --global "markfetch@^0.7.1" # --raw + HTTP/1.1 fetch

      - name: Build the digest
        run: uv run python -m keepup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit the week
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet && exit 0
          git commit -m "chore(digest): $(date -u +%G-W%V)"
          git push
