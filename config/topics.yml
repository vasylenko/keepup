# Curated sources per topic — the single hand-edited input to the pipeline.
llm:
  model: openai/gpt-4.1 # free "high" tier: 50 req/day — we use ~1/week

topics:
  - name: AI/LLM tooling
    descriptions: true
    feeds:
      - url: https://openai.com/news/rss.xml
        name: OpenAI
        # openai.com/news/engineering + /news/product-releases; the feed
        # labels those sections Engineering and Product
        categories: [Engineering, Product]
      - url: https://developers.openai.com/codex/changelog/rss.xml
        name: Codex changelog
        group: OpenAI # Codex is an OpenAI product
      - url: https://code.claude.com/docs/en/whats-new/rss.xml
        name: Claude Code
        group: Anthropic # Claude Code is an Anthropic product
    sitemaps: # Anthropic has no RSS
      - url: https://www.anthropic.com/sitemap.xml
        path_prefix: /news/
        name: Anthropic
      - url: https://www.anthropic.com/sitemap.xml
        path_prefix: /engineering/
        name: Anthropic
    release_notes: # no RSS; ChatGPT changelog behind a Next.js RSC page
      - url: https://openai.com/products/release-notes/
        products: [chatgpt] # Codex covered by its own changelog feed above
        name: ChatGPT release notes
        group: OpenAI

  - name: Engineering blogs
    descriptions: true
    feeds:
      - url: https://newsletter.pragmaticengineer.com/feed
        name: The Pragmatic Engineer # keeps the quiet-week label consistent
      - url: https://simonwillison.net/atom/entries/ # long-form only; /everything/ is a linkblog flood
        name: Simon Willison
      - url: https://lethain.com/feeds/
        name: Will Larson

  - name: Cloud (AWS)
    # AWS's marchitecture areas set the universe; the LLM sorts each item into
    # a bucket by what it's about (Security wins cross-cutting cases like
    # GuardDuty-on-EKS, which AWS tags under both security and containers).
    buckets: [Containers, Security, Compute]
    feeds:
      - url: https://aws.amazon.com/about-aws/whats-new/recent/feed/
        name: AWS What's New # the feed titles itself "Recent Announcements"
        categories:
          - marketing:marchitecture/containers
          - marketing:marchitecture/compute
          - marketing:marchitecture/security-identity-and-compliance
          - general:products/aws-secrets-manager # AWS tags this without a marchitecture area
